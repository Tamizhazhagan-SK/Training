<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: center;
            
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, sans-serif;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            background: linear-gradient(90deg in oklab, blue, red);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0078d7;
            margin-bottom: 15px;
            text-align: center;
        }

        p {
            margin-bottom: 10px;
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to My Sample Website</h1>
        <p>
            This is a basic HTML starter template with common meta tags,
            CSS styling, and sample content.
        </p>
        <p>
            This is a starting point for learning
            HTML, CSS, and JavaScript.
        </p>
    </div>

</body>
</html>
